{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wildfire Tracker{% endblock %}</title>
    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else if (saved === 'light' || (!saved && !prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <h1 class="site-logo">
            <a href="{% url 'home' %}">
                <img class="logo-light" src="{% static 'light.png' %}" alt="Wildfire Tracker">
                <img class="logo-dark" src="{% static 'dark.png' %}" alt="Wildfire Tracker">
            </a>
        </h1>
        <nav>
            <ul>
                <li><a href="{% url 'home' %}">Home</a></li>
                <a href="{% url 'admin:index' %}">Admin</a>
                <li>
                    <button type="button" class="theme-toggle" aria-label="Toggle dark mode">
                        <svg class="icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 6 6c0 2.2-1.2 4.1-3 5.2V17a1 1 0 0 1-2 0v-2.8C9.2 13.1 8 11.2 8 9a6 6 0 0 0 4-5.7V3a1 1 0 0 1 2 0v.3z"/><circle cx="12" cy="14" r="3"/></svg>
                        <svg class="icon-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>&copy; {{ current_year }} Wildfire Tracker</p>
    </footer>
    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>
